name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install dependencies
      run: uv sync

    - name: Lint
      run: uv run ruff check src/ tests/

    - name: Unit tests
      run: uv run pytest tests/ -m "not integration"
      env:
        LANGFUSE_DISABLE_BOOTSTRAP: "1"
